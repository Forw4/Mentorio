
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  .wrap {
    display: flex;
    justify-content: center;
    padding: 32px 0 24px;
    font-family: 'DM Sans', sans-serif;
  }
  .card {
    width: 320px;
    background: #0d0d0d;
    border-radius: 32px;
    border: 1px solid #1e1e1e;
    padding: 36px 28px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .step-done {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: #F4A080;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .question {
    font-size: 22px;
    color: #fff;
    font-weight: 300;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 40px;
  }

  .slider-area {
    width: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
  }

  .track-wrap {
    width: 100%;
    height: 44px;
    display: flex;
    align-items: center;
    position: relative;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .track-wrap:active { cursor: grabbing; }

  .track-bg {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: #1e1e1e;
    border-radius: 2px;
  }
  .track-fill {
    position: absolute;
    left: 50%;
    height: 4px;
    border-radius: 2px;
    background: #F4A080;
    transition: width 0.05s, left 0.05s;
    pointer-events: none;
  }

  .tick-container {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 2px;
    pointer-events: none;
  }
  .tick {
    width: 2px;
    height: 8px;
    background: #2a2a2a;
    border-radius: 1px;
    transition: background 0.2s;
  }
  .tick.lit { background: #F4A08060; }

  .thumb {
    position: absolute;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #F4A080;
    border: 3px solid #0d0d0d;
    box-shadow: 0 0 0 1px #F4A08066;
    left: 50%;
    transform: translateX(-50%);
    transition: transform 0.05s, box-shadow 0.15s, width 0.15s, height 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .thumb.dragging {
    width: 38px;
    height: 38px;
    box-shadow: 0 0 0 8px #F4A08022;
  }
  .thumb-inner {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #1a0c06;
  }

  .labels-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
  }
  .lab {
    font-size: 12px;
    color: #333;
    transition: color 0.3s, font-size 0.3s;
    line-height: 1.3;
    text-align: center;
    max-width: 80px;
  }
  .lab.active { color: #F4A080; }
  .lab span { display: block; font-size: 18px; margin-bottom: 2px; }
  .lab-mid {
    font-size: 12px;
    color: #222;
    text-align: center;
    margin-top: 8px;
    transition: color 0.3s;
  }
  .lab-mid.active { color: #888; }

  .confirm-btn {
    width: 100%;
    background: #F4A080;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 15px;
    font-weight: 500;
    color: #1a0c06;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s, transform 0.2s;
    pointer-events: none;
    transform: translateY(6px);
  }
  .confirm-btn.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }
  .confirm-btn:active { transform: scale(0.97); }

  .result-label {
    font-size: 13px;
    color: #444;
    margin-top: 12px;
    min-height: 18px;
    transition: color 0.3s;
    text-align: center;
  }

  .bubble {
    position: absolute;
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    padding: 5px 10px;
    font-size: 12px;
    color: #F4A080;
    white-space: nowrap;
    bottom: 52px;
    transform: translateX(-50%);
    left: 50%;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .bubble::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #2e2e2e;
  }
</style>

<div class="wrap">
  <div class="card">
    <div class="step-done">Step done</div>
    <div class="question">Насколько<br>это далось?</div>

    <div class="slider-area">
      <div class="bubble" id="bubble">Потяни меня</div>
      <div class="track-wrap" id="trackWrap">
        <div class="track-bg"></div>
        <div class="track-fill" id="fill"></div>
        <div class="tick-container" id="ticks"></div>
        <div class="thumb" id="thumb">
          <div class="thumb-inner"></div>
        </div>
      </div>

      <div class="labels-row">
        <div class="lab" id="labLeft"><span>🧱</span>Пришлось<br>выживать</div>
        <div class="lab lab-mid" id="labMid">нормально</div>
        <div class="lab" id="labRight"><span>🌊</span>Зашло<br>легко</div>
      </div>
    </div>

    <div class="result-label" id="resultLabel"></div>

    <div style="height: 16px"></div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmChoice()">Записать →</button>
  </div>
</div>

<script>
const wrap = document.getElementById('trackWrap');
const thumb = document.getElementById('thumb');
const fill = document.getElementById('fill');
const ticks = document.getElementById('ticks');
const labLeft = document.getElementById('labLeft');
const labMid = document.getElementById('labMid');
const labRight = document.getElementById('labRight');
const confirmBtn = document.getElementById('confirmBtn');
const resultLabel = document.getElementById('resultLabel');
const bubble = document.getElementById('bubble');

const TICK_COUNT = 9;
for (let i = 0; i < TICK_COUNT; i++) {
  const t = document.createElement('div');
  t.className = 'tick';
  ticks.appendChild(t);
}

let val = 0.5;
let dragging = false;
let hasMoved = false;
let lastVibrateZone = -1;

function getX(e) {
  if (e.touches) return e.touches[0].clientX;
  return e.clientX;
}

function setVal(v) {
  val = Math.max(0, Math.min(1, v));
  const w = wrap.getBoundingClientRect().width;
  const px = val * w;

  thumb.style.left = px + 'px';

  if (val < 0.5) {
    fill.style.left = (val * w) + 'px';
    fill.style.width = ((0.5 - val) * w) + 'px';
  } else {
    fill.style.left = (0.5 * w) + 'px';
    fill.style.width = ((val - 0.5) * w) + 'px';
  }

  const tickEls = ticks.querySelectorAll('.tick');
  tickEls.forEach((t, i) => {
    const tickVal = i / (TICK_COUNT - 1);
    const lit = (val < 0.5 && tickVal >= val && tickVal <= 0.5) ||
                (val > 0.5 && tickVal >= 0.5 && tickVal <= val) ||
                (val === 0.5 && tickVal === 0.5);
    t.classList.toggle('lit', lit);
  });

  const zone = Math.floor(val * 5);
  if (zone !== lastVibrateZone && hasMoved) {
    if (navigator.vibrate) navigator.vibrate(8);
    lastVibrateZone = zone;
  }

  const hard = Math.max(0, 1 - val * 2);
  const easy = Math.max(0, val * 2 - 1);
  const mid = 1 - Math.abs(val - 0.5) * 4;

  labLeft.style.color = `rgba(244,160,128,${0.2 + hard * 0.8})`;
  labRight.style.color = `rgba(244,160,128,${0.2 + easy * 0.8})`;
  labMid.style.color = `rgba(136,136,136,${0.15 + Math.max(0,mid) * 0.85})`;

  bubble.style.left = px + 'px';

  updateLabel();
}

function updateLabel() {
  let text = '';
  if (val < 0.2) text = 'Это было испытание';
  else if (val < 0.4) text = 'Далось с усилием';
  else if (val < 0.6) text = 'Примерно как ожидал';
  else if (val < 0.8) text = 'Легче, чем казалось';
  else text = 'Вообще не напрягся';
  resultLabel.textContent = text;
  resultLabel.style.color = '#666';
}

function onDown(e) {
  dragging = true;
  thumb.classList.add('dragging');
  bubble.style.opacity = '0';
  onMove(e);
}

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  if (!hasMoved) hasMoved = true;
  const rect = wrap.getBoundingClientRect();
  const x = getX(e) - rect.left;
  setVal(x / rect.width);
  if (!confirmBtn.classList.contains('visible')) {
    confirmBtn.classList.add('visible');
  }
}

function onUp() {
  if (!dragging) return;
  dragging = false;
  thumb.classList.remove('dragging');
  if (navigator.vibrate) navigator.vibrate([12, 30, 12]);
}

wrap.addEventListener('mousedown', onDown);
wrap.addEventListener('touchstart', onDown, {passive: false});
document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, {passive: false});
document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp);

function confirmChoice() {
  const zones = ['🧱 Тяжело', '💪 С усилием', '⚖️ Нормально', '🌿 Легче чем думал', '🌊 Легко'];
  const z = Math.min(4, Math.floor(val * 5));
  confirmBtn.textContent = zones[z] + ' — сохранено';
  confirmBtn.style.opacity = '0.6';
  confirmBtn.style.pointerEvents = 'none';
  resultLabel.style.color = '#F4A080';
  if (navigator.vibrate) navigator.vibrate([10, 20, 60]);
}

setTimeout(() => {
  bubble.style.opacity = '1';
  setTimeout(() => { bubble.style.opacity = '0'; }, 2200);
}, 600);

setVal(0.5);
</script>
